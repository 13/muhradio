lib_deps =
    ${env.lib_deps}
    LSatan/SmartRC-CC1101-Driver-Lib
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_ds18b20=\"DS18B20\"
    -DSENSOR_PIN_DS18B20=3
    -DSENSOR_TYPE_bme680=\"BME680\"
    -DDS_L=60 -DDS_S=8 -DDS_D=100
    -DUSE_CC1101
    -DCC1101_MHZ=868.32
    -DCC1101_POWER=12
    -DCUSTOM_UID=\"16\"
    -DVERBOSE

[env:cc1101_ds18b20_si7021]
; DS18B20 + Si7021 on the same node. DS18B20 on pin 3, Si7021 on I2C.
; DDS_L – Timed sleep in seconds (must be ≥8 seconds)
; DDS_D – Pre-sleep delay in milliseconds
; t=0: sleep forever (interrupt wake)
; t=1..7: sleep t minutes  (note: uint16_t arithmetic prevents overflow)
; t=8+: sleep t seconds
lib_deps =
    ${env.lib_deps}
    LSatan/SmartRC-CC1101-Driver-Lib
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_ds18b20=\"DS18B20\"
    -DSENSOR_PIN_DS18B20=3
    -DSENSOR_TYPE_si7021=\"SI7021\"
    -DDS_L=2 -DDS_D=100
    -DUSE_CC1101
    -DCC1101_MHZ=868.32
    -DCC1101_POWER=12
    -DCUSTOM_UID=\"0E\"
    -DVERBOSE

[env:cc1101_ds18b20_si7021_bmp280]
; DS18B20 + Si7021 + BMP280 on the same node. DS18B20 on pin 3, Si7021 and BMP280 on I2C.
lib_deps =
    ${env.lib_deps}
    LSatan/SmartRC-CC1101-Driver-Lib
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_ds18b20=\"DS18B20\"
    -DSENSOR_PIN_DS18B20=3
    -DSENSOR_TYPE_si7021=\"SI7021\"
    -DSENSOR_TYPE_bmp280=\"BMP280\"
    -DDS_L=60 -DDS_S=8 -DDS_D=100
    -DUSE_CC1101
    -DCC1101_MHZ=868.32
    -DCC1101_POWER=12
    -DCUSTOM_UID=\"0D\"
    -DVERBOSE

