; PlatformIO Project Configuration File
;
; AES crypto: copy pio_secrets_example.py -> pio_secrets.py and set AES_KEY.
; Build one node:  pio run -e node_button --target upload
; Build all nodes: pio run

; -------------------------------------------------------
; Node registry — one line per physical device.
; Before adding a new node: pick the next free UID here,
; then add its [env:node_xxx] block below.
;   Range	    Source
;   0x01–0xFF	Hand-assigned via CUSTOM_UID
;   0x100–0xFFF	Auto-generated random
;
;   UID   DEC   env name                     radio   name        sensors
;   0x01   1    cc1101_ds18b20               CC1101              DS18B20
;   0x02   2    cc1101_test                  CC1101  TEST        (none)
;   0x0D  13    cc1101_ds18b20_si7021_bmp280 CC1101  KOMMER      DS18B20 + Si7021 + BMP280
;   0x0E  14    cc1101_ds18b20_si7021        CC1101  GARTEN      DS18B20 + Si7021
;   0x16  22    cc1101_ds18b20_bme680        CC1101  DG_DUSCHE   DS18B20 + BME680
;   0x20  32    cc1101_si7021                CC1101  TEST    Si7021
;   0x40  64    cc1101_switch                CC1101  G_TREPPE    switch
;   0x50  80    cc1101_pir                   CC1101  G_TREPPE    PIR
;   0x51  81    cc1101_pir                   CC1101  TEST        PIR
;   0x52  82    cc1101_pir                   CC1101  TEST        PIR
;   0x60  96    cc1101_button                CC1101  G_TOURAN    button
;   0x61  97    cc1101_button_test           CC1101  TEST        button
;   0x63  99    cc1101_button                CC1101  TEST        button
;   0x64 100    node_button                  LORA    TEST        button
; -------------------------------------------------------

[platformio]
default_envs = node_button

; -------------------------------------------------------
; Hardware + libraries shared by all nodes
; -------------------------------------------------------
[env]
platform = atmelavr
board = pro8MHzatmega328
framework = arduino
upload_port = /dev/arduino/promini
monitor_port = /dev/arduino/promini
monitor_speed = 9600
monitor_filters = default, time
lib_deps =
    sandeepmistry/LoRa @ ^0.8.0
    adafruit/Adafruit Si7021 Library @ ^1.5.3
    adafruit/Adafruit BME680 Library @ ^2.0.6
    adafruit/Adafruit BMP280 Library @ ^3.0.0
    milesburton/DallasTemperature @ ^4.0.6
    rocketscream/Low-Power @ ^1.81
    rweather/Crypto @ ^0.4.0
    Voltage Reference

; -------------------------------------------------------
; Node environments
; -------------------------------------------------------

[env:node_heartbeat]
; No sensor — sends VCC + packet counter every DS_L minutes, retained on broker.
build_flags =
    !python build_flags.py
    -DDS_L=5 -DDS_S=8 -DDS_D=100
    -DLO_FREQ=868E6 -DLO_POWER=17
    -DCUSTOM_UID=\"XX\"
    -DMQTT_RETAINED
    -DVERBOSE_PC
    -DVERBOSE

[env:node_button]
; Button on pin 3. Sleeps forever, wakes on press.
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_button=\"BUTTON\"
    -DSENSOR_PIN_BUTTON=3
    -DDS_S=8 -DDS_D=100
    -DLO_FREQ=868E6 -DLO_POWER=17
    -DCUSTOM_UID=\"64\"
    -DVERBOSE

[env:node_si7021]
; Si7021 temp+humidity. Wakes every DS_L seconds.
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_si7021=\"SI7021\"
    -DDS_L=36 -DDS_S=8 -DDS_D=100
    -DLO_FREQ=868E6 -DLO_POWER=17
    -DCUSTOM_UID=\"02\"
    -DVERBOSE

[env:node_bme680]
; BME680 weather station: temperature, humidity, pressure, gas.
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_bme680=\"BME680\"
    -DDS_L=60 -DDS_S=8 -DDS_D=100
    -DLO_FREQ=868E6 -DLO_POWER=17
    -DCUSTOM_UID=\"03\"
    -DVERBOSE

[env:node_pir]
; PIR motion sensor on pin 3. Sleeps forever, wakes on motion.
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_pir=\"PIR\"
    -DSENSOR_PIN_PIR=3
    -DDS_S=8 -DDS_D=100
    -DLO_FREQ=868E6 -DLO_POWER=17
    -DCUSTOM_UID=\"04\"
    -DVERBOSE

[env:node_pir_random_uid]
; PIR motion sensor on pin 3. Sleeps forever, wakes on motion.
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_pir=\"PIR\"
    -DSENSOR_PIN_PIR=3
    -DDS_S=8 -DDS_D=100
    -DLO_FREQ=868E6 -DLO_POWER=17
    -DVERBOSE

[env:node_si7021_bme680]
; Si7021 + BME680 on the same I2C bus (0x40 + 0x76 — no address conflict).
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_si7021=\"SI7021\"
    -DSENSOR_TYPE_bme680=\"BME680\"
    -DDS_L=60 -DDS_S=8 -DDS_D=100
    -DLO_FREQ=868E6 -DLO_POWER=17
    -DCUSTOM_UID=\"05\"
    -DVERBOSE

; -------------------------------------------------------
; CC1101 node environments
; CC1101 default SPI pins on Pro Mini (hardware SPI):
;   SCK=13  MISO=12  MOSI=11  SS=10  GDO0=2
; -------------------------------------------------------

[env:cc1101_test]
; No sensor — sends VCC + packet counter every DS_L minutes, retained on broker.
lib_deps =
    ${env.lib_deps}
    LSatan/SmartRC-CC1101-Driver-Lib
build_flags =
    !python build_flags.py
    -DDS_L=8 -DDS_S=8 -DDS_D=100
    -DUSE_CC1101
    -DCC1101_MHZ=868.32
    -DCC1101_POWER=12
    -DMQTT_RETAINED
    -DVERBOSE_PC
    -DVERBOSE

[env:cc1101_button]
; Button on pin 3. Sleeps forever, wakes on press.
lib_deps =
    ${env.lib_deps}
    LSatan/SmartRC-CC1101-Driver-Lib
build_flags =
    !python build_flags.py
    -DSENSOR_TYPE_button=\"BUTTON\"
