; PlatformIO Project Configuration File
;
; Receiver for muh-radio LoRa + CC1101 sensor network.
; Secrets (WIFI_PASS, MQTT_PASS, AES_KEY) live in pio_secrets.py (gitignored).
;   cp pio_secrets_example.py pio_secrets.py   # then fill in your values
;
; CC1101 wiring (shares LoRa SPI bus, different CS):
;   ESP32-S3:  SCK=9  MISO=7  MOSI=8  SS=6
;   ESP32-C3:  SCK=8  MISO=6  MOSI=7  SS=5

[platformio]
default_envs = esp32-s3-zero

; ── Shared settings ────────────────────────────────────────────────────────────
[env]
extra_scripts = post:merge_bins.py
platform    = espressif32 @ 7.0.1
framework   = arduino
monitor_speed   = 115200
monitor_filters = default, time
board_build.filesystem  = littlefs
board_upload.flash_size = 4MB
board_build.partitions  = default.csv
lib_ldf_mode = deep
build_flags =
    !python build_flags.py
    -DLO_FREQ=868E6
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    knolleary/PubSubClient@^2.8
    arduino-libraries/NTPClient@^3.2.1
    rweather/Crypto@^0.4.0
    esphome/AsyncTCP-esphome@^2.1.4
    esphome/ESPAsyncWebServer-esphome@^3.4.0
    LSatan/SmartRC-CC1101-Driver-Lib@^3.0.2

; ── esp32-s3-zero (LoRa) ──────────────────────────────────────────────────────
[env:esp32-s3-zero]
board        = esp32-s3-devkitc-1
upload_port  = /dev/arduino/s3zero
monitor_port = /dev/arduino/s3zero
build_flags  =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DUSE_LORA

; ── esp32-s3-zero (CC1101) ────────────────────────────────────────────────────
; CC1101 wiring: SCK=9  MISO=7  MOSI=8  SS=6  GDO0=2
[env:esp32-s3-zero-cc1101]
board        = esp32-s3-devkitc-1
upload_port  = /dev/arduino/s3zero
monitor_port = /dev/arduino/s3zero
build_flags  =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DUSE_CC1101
    -DCC1101_MHZ=868.32
    -DCC1101_SCK=9 -DCC1101_MISO=7 -DCC1101_MOSI=8 -DCC1101_SS=6 -DCC1101_GDO0=2

; ── esp32-c3-mini (LoRa) ──────────────────────────────────────────────────────
[env:esp32-c3-mini]
board        = lolin_c3_mini
upload_port  = /dev/arduino/c3mini
monitor_port = /dev/arduino/c3mini
build_flags  =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_LORA

; ── esp32-c3-mini (CC1101) ────────────────────────────────────────────────────
; CC1101 wiring: SCK=8  MISO=6  MOSI=7  SS=5  GDO0=2
[env:esp32-c3-mini-cc1101]
board        = lolin_c3_mini
upload_port  = /dev/arduino/c3mini
monitor_port = /dev/arduino/c3mini
build_flags  =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_CC1101
    -DCC1101_MHZ=868.32
    -DCC1101_SCK=8 -DCC1101_MISO=6 -DCC1101_MOSI=7 -DCC1101_SS=5 -DCC1101_GDO0=2

; ── d1_mini (ESP8266, CC1101 only) ────────────────────────────────────────────
; CC1101 wiring: SCK=D5(14) MISO=D6(12) MOSI=D7(13) CSN=D8(15) GDO0=D1(5)
[env:d1_mini]
platform     = espressif8266
board        = d1_mini
framework    = arduino
upload_port  = /dev/arduino/d1mini
monitor_port = /dev/arduino/d1mini
extra_scripts =
board_build.filesystem = littlefs
lib_deps =
    knolleary/PubSubClient@^2.8
    arduino-libraries/NTPClient@^3.2.1
    rweather/Crypto@^0.4.0
    esphome/ESPAsyncWebServer-esphome@^3.4.0
    LSatan/SmartRC-CC1101-Driver-Lib@^3.0.2
build_flags =
    !python build_flags.py
    -DUSE_CC1101
    -DCC1101_MHZ=868.32
    -DCC1101_SCK=14 -DCC1101_MISO=12 -DCC1101_MOSI=13 -DCC1101_SS=15 -DCC1101_GDO0=5

; ── d1_mini (ESP8266, CC1101 only, espota) ────────────────────────────────────────────
; CC1101 wiring: SCK=D5(14) MISO=D6(12) MOSI=D7(13) CSN=D8(15) GDO0=D1(5)
[env:d1_mini_espota]
platform     = espressif8266 @ 4.2.1
board        = d1_mini
framework    = arduino
;upload_port  = /dev/arduino/d1mini
;monitor_port = /dev/arduino/d1mini
upload_protocol  = espota
upload_port      = 192.168.23.208
extra_scripts =
board_build.filesystem = littlefs
lib_deps =
    knolleary/PubSubClient@^2.8
    arduino-libraries/NTPClient@^3.2.1
    rweather/Crypto@^0.4.0
    esphome/ESPAsyncWebServer-esphome@^3.4.0
    LSatan/SmartRC-CC1101-Driver-Lib@^3.0.2
build_flags =
    !python build_flags.py
    -DUSE_CC1101
    -DCC1101_MHZ=868.32
    -DCC1101_SCK=14 -DCC1101_MISO=12 -DCC1101_MOSI=13 -DCC1101_SS=15 -DCC1101_GDO0=5

; ── esp32-s3-zero (Bresser 7003600) ──────────────────────────────────────────
; CC1101 wiring: SCK=9  MISO=7  MOSI=8  SS=6  GDO0=2
[env:esp32-s3-zero-bresser]
board        = esp32-s3-devkitc-1
upload_port  = /dev/arduino/s3zero
monitor_port = /dev/arduino/s3zero
build_src_filter = +<*> -<radio.cpp>
build_flags  =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DUSE_BRESSER
    -DCC1101_SCK=9 -DCC1101_MISO=7 -DCC1101_MOSI=8 -DCC1101_SS=6 -DCC1101_GDO0=2

; ── esp32-c3-mini (Bresser 7003600) ──────────────────────────────────────────
; CC1101 wiring: SCK=8  MISO=6  MOSI=7  SS=5  GDO0=2
[env:esp32-c3-mini-bresser]
board        = lolin_c3_mini
upload_port  = /dev/arduino/c3mini
monitor_port = /dev/arduino/c3mini
build_src_filter = +<*> -<radio.cpp>
build_flags  =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_BRESSER
    -DCC1101_SCK=8 -DCC1101_MISO=6 -DCC1101_MOSI=7 -DCC1101_SS=5 -DCC1101_GDO0=2

; ── d1_mini (Bresser 7003600) ─────────────────────────────────────────────────
; CC1101 wiring: SCK=D5(14) MISO=D6(12) MOSI=D7(13) CSN=D8(15) GDO0=D1(5)
[env:d1_mini-bresser]
platform     = espressif8266
board        = d1_mini
framework    = arduino
upload_port  = /dev/arduino/d1mini
monitor_port = /dev/arduino/d1mini
extra_scripts =
board_build.filesystem = littlefs
build_src_filter = +<*> -<radio.cpp>
lib_deps =
    knolleary/PubSubClient@^2.8
    arduino-libraries/NTPClient@^3.2.1
    esphome/ESPAsyncWebServer-esphome@^3.4.0
    LSatan/SmartRC-CC1101-Driver-Lib@^3.0.2
build_flags =
    !python build_flags.py
    -DUSE_BRESSER
    -DCC1101_SCK=14 -DCC1101_MISO=12 -DCC1101_MOSI=13 -DCC1101_SS=15 -DCC1101_GDO0=5

[env:d1_mini-bresser-ota]
platform     = espressif8266
board        = d1_mini
framework    = arduino
;upload_port  = /dev/arduino/d1mini
;monitor_port = /dev/arduino/d1mini
upload_protocol  = espota
upload_port      = 192.168.23.213
extra_scripts =
board_build.filesystem = littlefs
build_src_filter = +<*> -<radio.cpp>
lib_deps =
    knolleary/PubSubClient@^2.8
    arduino-libraries/NTPClient@^3.2.1
    esphome/ESPAsyncWebServer-esphome@^3.4.0
    LSatan/SmartRC-CC1101-Driver-Lib@^3.0.2
build_flags =
    !python build_flags.py
    -DUSE_BRESSER
    -DCC1101_SCK=14 -DCC1101_MISO=12 -DCC1101_MOSI=13 -DCC1101_SS=15 -DCC1101_GDO0=5