<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" id="themeColor" content="#f9fafb" />
    <title>Settings</title>
    <link rel="icon" href="favicon.ico" />
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>
    <script src="js/tailwind.js"></script>
    <style type="text/tailwindcss">
      @variant dark (&:where(.dark, .dark *));
    </style>
  </head>

  <body class="bg-gray-100 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col">

    <nav class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-10">
      <div id="ws-bar" class="h-1 transition-colors duration-300"></div>
      <div class="max-w-2xl mx-auto px-4 h-12 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2">
          <img src="/images/muhradio.png" alt="" class="w-7 h-7" />
          <span id="desc" class="font-semibold text-sm text-gray-800 dark:text-gray-100"></span>
        </a>
        <div class="flex items-center gap-4">
          <a href="/" title="Dashboard" class="text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 flex items-center transition-colors"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M9.293 2.293a1 1 0 0 1 1.414 0l7 7A1 1 0 0 1 17 11h-1v6a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-6H3a1 1 0 0 1-.707-1.707l7-7Z" clip-rule="evenodd"/></svg></a>
          <a href="/update.html" title="Firmware" class="text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 flex items-center transition-colors"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path d="M9.25 13.25a.75.75 0 0 0 1.5 0V4.636l2.955 3.129a.75.75 0 0 0 1.09-1.03l-4.25-4.5a.75.75 0 0 0-1.09 0l-4.25 4.5a.75.75 0 1 0 1.09 1.03L9.25 4.636v8.614Z"/><path d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z"/></svg></a>
          <a href="/settings.html" title="Settings" class="text-gray-800 dark:text-gray-100 flex items-center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.25l-1.18 2.045a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/></svg></a>
          <button id="themeBtn" class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-100 flex items-center transition-colors"></button>
          <button onclick="location.reload()" title="Refresh" class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-100 flex items-center transition-colors"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 0 1-9.201 2.466l-.312-.311h2.433a.75.75 0 0 0 0-1.5H3.989a.75.75 0 0 0-.75.75v4.242a.75.75 0 0 0 1.5 0v-2.43l.31.31a7 7 0 0 0 11.712-3.138.75.75 0 0 0-1.449-.39Zm1.23-3.723a.75.75 0 0 0 .219-.53V2.929a.75.75 0 0 0-1.5 0V5.36l-.31-.31A7 7 0 0 0 3.239 8.188a.75.75 0 1 0 1.448.389A5.5 5.5 0 0 1 13.89 6.11l.311.31h-2.432a.75.75 0 0 0 0 1.5h4.243a.75.75 0 0 0 .53-.219Z" clip-rule="evenodd"/></svg></button>
        </div>
      </div>
    </nav>

    <main class="flex-1 py-4">
      <div class="max-w-2xl mx-auto px-4 flex flex-col gap-4">

        <!-- Device section — always open, not collapsible -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
          <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800">
            <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Device</span>
          </div>
          <div class="p-4 flex flex-col gap-3">
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Description</span>
              <input id="desc_field" name="desc" type="text" maxlength="63" placeholder="Receiver"
                     class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                            px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                            text-gray-900 dark:text-gray-100 min-h-[44px]" />
            </label>
          </div>
        </div>

        <!-- Time section -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
          <button class="card-hdr w-full px-4 py-3 flex items-center justify-between text-left">
            <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Time</span>
            <svg class="card-chevron w-4 h-4 text-gray-400 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
          </button>
          <div class="border-t border-gray-100 dark:border-gray-800 p-4 flex flex-col gap-3">
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Timezone</span>
              <select id="tz_offset"
                      class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                             px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                             text-gray-900 dark:text-gray-100 min-h-[44px]">
                <option value="-720">UTC−12:00</option>
                <option value="-660">UTC−11:00</option>
                <option value="-600">UTC−10:00 (Hawaii)</option>
                <option value="-570">UTC−09:30</option>
                <option value="-540">UTC−09:00 (Alaska)</option>
                <option value="-480">UTC−08:00 (PST)</option>
                <option value="-420">UTC−07:00 (MST / PDT)</option>
                <option value="-360">UTC−06:00 (CST / MDT)</option>
                <option value="-300">UTC−05:00 (EST / CDT)</option>
                <option value="-240">UTC−04:00 (AST / EDT)</option>
                <option value="-210">UTC−03:30 (Newfoundland)</option>
                <option value="-180">UTC−03:00 (BRT / ART)</option>
                <option value="-120">UTC−02:00</option>
                <option value="-60">UTC−01:00 (Azores)</option>
                <option value="0">UTC±00:00 (GMT / WET)</option>
                <option value="60">UTC+01:00 (CET / WAT)</option>
                <option value="120">UTC+02:00 (EET / CAT)</option>
                <option value="180">UTC+03:00 (MSK / EAT)</option>
                <option value="210">UTC+03:30 (Iran)</option>
                <option value="240">UTC+04:00 (GST)</option>
                <option value="270">UTC+04:30 (Afghanistan)</option>
                <option value="300">UTC+05:00 (PKT)</option>
                <option value="330">UTC+05:30 (India / Sri Lanka)</option>
                <option value="345">UTC+05:45 (Nepal)</option>
                <option value="360">UTC+06:00 (BST / BTT)</option>
                <option value="390">UTC+06:30 (Myanmar)</option>
                <option value="420">UTC+07:00 (ICT / WIB)</option>
                <option value="480">UTC+08:00 (CST / AWST)</option>
                <option value="525">UTC+08:45 (Eucla)</option>
                <option value="540">UTC+09:00 (JST / KST)</option>
                <option value="570">UTC+09:30 (ACST)</option>
                <option value="600">UTC+10:00 (AEST)</option>
                <option value="630">UTC+10:30 (Lord Howe)</option>
                <option value="660">UTC+11:00 (SBT)</option>
                <option value="720">UTC+12:00 (NZST / FJT)</option>
                <option value="765">UTC+12:45 (Chatham)</option>
                <option value="780">UTC+13:00 (TOT)</option>
                <option value="840">UTC+14:00 (LINT)</option>
              </select>
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Summer time (DST)</span>
              <select id="dst_mode"
                      class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                             px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                             text-gray-900 dark:text-gray-100 min-h-[44px]">
                <option value="2">Auto — EU rules (last Sunday of March / October)</option>
                <option value="0">Off — standard time all year</option>
                <option value="1">On — summer time all year</option>
              </select>
            </label>
          </div>
        </div>

        <!-- WiFi section -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
          <button class="card-hdr w-full px-4 py-3 flex items-center justify-between text-left">
            <span class="text-sm font-medium text-gray-500 dark:text-gray-400">WiFi</span>
            <svg class="card-chevron w-4 h-4 text-gray-400 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
          </button>
          <div class="border-t border-gray-100 dark:border-gray-800 p-4 flex flex-col gap-3">
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">SSID</span>
              <input id="wifi_ssid" name="wifi_ssid" type="text" maxlength="63" placeholder="Network name"
                     class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                            px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                            text-gray-900 dark:text-gray-100 min-h-[44px]" />
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Password</span>
              <div class="relative">
                <input id="wifi_pass" name="wifi_pass" type="password" maxlength="63" placeholder="••••••••"
                       class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                              px-3 py-2 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                              text-gray-900 dark:text-gray-100 min-h-[44px]" />
                <button type="button" data-toggle="wifi_pass"
                        class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600
                               dark:hover:text-gray-200 px-1 py-1 min-h-[36px]">
                  Show
                </button>
              </div>
            </label>
          </div>
        </div>

        <!-- NTP section -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
          <button class="card-hdr w-full px-4 py-3 flex items-center justify-between text-left">
            <span class="text-sm font-medium text-gray-500 dark:text-gray-400">NTP</span>
            <svg class="card-chevron w-4 h-4 text-gray-400 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
          </button>
          <div class="border-t border-gray-100 dark:border-gray-800 p-4 flex flex-col gap-3">
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Server 1</span>
              <input id="ntp1" name="ntp1" type="text" maxlength="63" placeholder="192.168.1.1"
                     class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                            px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                            text-gray-900 dark:text-gray-100 min-h-[44px]" />
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Server 2</span>
              <input id="ntp2" name="ntp2" type="text" maxlength="63" placeholder="pool.ntp.org"
                     class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                            px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                            text-gray-900 dark:text-gray-100 min-h-[44px]" />
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Server 3</span>
              <input id="ntp3" name="ntp3" type="text" maxlength="63" placeholder="time.cloudflare.com"
                     class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                            px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                            text-gray-900 dark:text-gray-100 min-h-[44px]" />
            </label>
          </div>
        </div>

        <!-- MQTT section -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
          <button class="card-hdr w-full px-4 py-3 flex items-center justify-between text-left">
            <span class="text-sm font-medium text-gray-500 dark:text-gray-400">MQTT</span>
            <svg class="card-chevron w-4 h-4 text-gray-400 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
          </button>
          <div class="border-t border-gray-100 dark:border-gray-800 p-4 flex flex-col gap-3">
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Server</span>
              <input id="mqtt_server" name="mqtt_server" type="text" maxlength="63" placeholder="192.168.1.1"
                     class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                            px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                            text-gray-900 dark:text-gray-100 min-h-[44px]" />
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Port</span>
              <input id="mqtt_port" name="mqtt_port" type="number" min="1" max="65535" placeholder="1883"
                     class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                            px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                            text-gray-900 dark:text-gray-100 min-h-[44px]" />
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Username</span>
              <input id="mqtt_user" name="mqtt_user" type="text" maxlength="31" placeholder="optional"
                     class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                            px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                            text-gray-900 dark:text-gray-100 min-h-[44px]" />
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Password</span>
              <div class="relative">
                <input id="mqtt_pass" name="mqtt_pass" type="password" maxlength="63" placeholder="optional"
                       class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800
                              px-3 py-2 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                              text-gray-900 dark:text-gray-100 min-h-[44px]" />
                <button type="button" data-toggle="mqtt_pass"
                        class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600
                               dark:hover:text-gray-200 px-1 py-1 min-h-[36px]">
                  Show
                </button>
              </div>
            </label>
          </div>
        </div>

        <!-- Save button -->
        <button id="saveBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700
                       text-white py-3 px-4 rounded-xl transition-colors font-medium text-sm min-h-[44px]">
          Save &amp; Reboot
        </button>

        <button id="resetBtn"
                class="w-full bg-transparent hover:bg-red-50 dark:hover:bg-red-950 active:bg-red-100
                       text-red-600 dark:text-red-400 border border-red-300 dark:border-red-800
                       py-3 px-4 rounded-xl transition-colors font-medium text-sm min-h-[44px]">
          Reset to defaults
        </button>

        <p id="statusMsg" class="text-center text-sm min-h-[1.25rem]"></p>

      </div>
    </main>

    <footer class="py-3 text-center border-t border-gray-200 dark:border-gray-800">
      <span id="version"></span>
    </footer>

    <!-- Reboot modal -->
    <div id="modal"
         class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
      <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-8 text-center w-full max-w-sm">
        <div id="spinner"
             class="w-10 h-10 border-4 border-blue-500 border-t-transparent
                    rounded-full animate-spin mx-auto mb-4"></div>
        <p id="modalStep" class="font-semibold text-gray-900 dark:text-white text-base"></p>
        <p id="modalMsg"  class="text-gray-500 dark:text-gray-400 text-sm mt-1"></p>
      </div>
    </div>

    <script>
      // ── Theme ─────────────────────────────────────────────────────────────────
      const html       = document.documentElement;
      const themeBtn   = document.getElementById('themeBtn');
      const themeColor = document.getElementById('themeColor');

      function applyTheme(dark) {
        html.classList.toggle('dark', dark);
        themeBtn.innerHTML = dark
          ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path d="M10 2a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 10 2ZM10 15a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 10 15ZM10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6ZM15.657 5.404a.75.75 0 1 0-1.06-1.06l-1.061 1.06a.75.75 0 0 0 1.06 1.06l1.06-1.06ZM6.464 14.596a.75.75 0 1 0-1.06-1.06l-1.06 1.06a.75.75 0 0 0 1.06 1.06l1.06-1.06ZM18 10a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 18 10ZM5 10a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 5 10ZM14.596 15.657a.75.75 0 0 0 1.06-1.06l-1.06-1.061a.75.75 0 1 0-1.06 1.06l1.06 1.06ZM5.404 6.464a.75.75 0 0 0 1.06-1.06L5.404 4.343a.75.75 0 0 0-1.06 1.06l1.06 1.061Z"/></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M7.455 2.004a.75.75 0 0 1 .26.77 7 7 0 0 0 9.958 7.967.75.75 0 0 1 1.067.853A8.5 8.5 0 1 1 6.647 1.921a.75.75 0 0 1 .808.083Z" clip-rule="evenodd"/></svg>';
        themeColor.content   = dark ? '#030712' : '#f9fafb';
        localStorage.setItem('theme', dark ? 'dark' : 'light');
      }
      applyTheme(html.classList.contains('dark'));
      themeBtn.addEventListener('click', () => applyTheme(!html.classList.contains('dark')));

      // ── DOM refs ──────────────────────────────────────────────────────────────
      const elTitle   = document.querySelector('title');
      const elDesc    = document.getElementById('desc');
      const elVersion = document.getElementById('version');
      const wsBar     = document.getElementById('ws-bar');
      const saveBtn   = document.getElementById('saveBtn');
      const statusMsg = document.getElementById('statusMsg');
      const elModal   = document.getElementById('modal');
      const elStep    = document.getElementById('modalStep');
      const elMsg     = document.getElementById('modalMsg');
      const elSpinner = document.getElementById('spinner');

      // ── WebSocket (for hostname/desc in header) ────────────────────────────────
      let prevVersion = null;

      function setWsBar(state) {
        wsBar.className = 'h-1 transition-colors duration-300 ' + (
          state === 'connected'    ? 'bg-green-500' :
          state === 'disconnected' ? 'bg-red-500'   : 'bg-gray-400');
      }
      setWsBar('connecting');

      function connect() {
        const ws = new WebSocket(`ws://${location.hostname}/ws`);
        ws.onopen  = () => setWsBar('connected');
        ws.onclose = () => { setWsBar('disconnected'); setTimeout(connect, 10_000); };
        ws.onmessage = (e) => {
          const d = JSON.parse(e.data);
          if (d.hostname) elTitle.textContent = d.hostname;
          if (d.desc) { elDesc.textContent = d.desc; elTitle.textContent = d.desc; }
          if (d.version && d.version !== prevVersion) {
            prevVersion = d.version;
            const a = document.createElement('a');
            a.href        = '/update.html';
            a.className   = 'text-gray-400 dark:text-gray-500 text-xs hover:text-gray-700 dark:hover:text-gray-300 transition-colors';
            a.textContent = d.version;
            elVersion.replaceChildren(a);
          }
        };
      }

      // ── Password show/hide ────────────────────────────────────────────────────
      document.querySelectorAll('[data-toggle]').forEach(btn => {
        btn.addEventListener('click', () => {
          const inp = document.getElementById(btn.dataset.toggle);
          const show = inp.type === 'password';
          inp.type = show ? 'text' : 'password';
          btn.textContent = show ? 'Hide' : 'Show';
        });
      });

      // ── Live title update from description field ──────────────────────────────
      document.getElementById('desc_field').addEventListener('input', e => {
        document.title = e.target.value || 'Settings';
      });

      // ── Load current config ───────────────────────────────────────────────────
      const fields = ['desc_field', 'wifi_ssid', 'wifi_pass', 'ntp1', 'ntp2', 'ntp3', 'mqtt_server', 'mqtt_port', 'mqtt_user', 'mqtt_pass', 'tz_offset', 'dst_mode'];
      const apiKeys = { desc_field: 'desc', wifi_ssid: 'wifi_ssid', wifi_pass: 'wifi_pass',
                        ntp1: 'ntp1', ntp2: 'ntp2', ntp3: 'ntp3',
                        mqtt_server: 'mqtt_server', mqtt_port: 'mqtt_port',
                        mqtt_user: 'mqtt_user', mqtt_pass: 'mqtt_pass',
                        tz_offset: 'tz_offset', dst_mode: 'dst_mode' };

      (function loadSettings(attempt) {
        fetch('/api/settings')
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(d => {
            for (const id of fields) {
              const el = document.getElementById(id);
              if (!el) continue;
              const val = d[apiKeys[id]] ?? '';
              el.value = val;
              if (val && el.type !== 'password' && el.tagName !== 'SELECT')
                el.placeholder = val;
            }
          })
          .catch(() => {
            if (attempt < 3) setTimeout(() => loadSettings(attempt + 1), 1500);
            else statusMsg.textContent = 'Could not load current settings.';
          });
      })(0);

      // ── Modal helpers ─────────────────────────────────────────────────────────
      function showModal(step, msg = '') {
        elStep.textContent = step;
        elMsg.textContent  = msg;
        elSpinner.classList.remove('hidden');
        elModal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      }
      function hideModal() {
        elModal.classList.add('hidden');
        document.body.style.overflow = '';
      }

      // ── Poll until device is back, then reload ────────────────────────────────
      function waitForReboot() {
        let tries = 0;
        (function check() {
          fetch('/ping')
            .then(r  => { if (r.ok) { hideModal(); setTimeout(() => location.reload(), 1500); }
                          else if (++tries < 60) setTimeout(check, 2000);
                          else hideModal(); })
            .catch(() => { if (++tries < 60) setTimeout(check, 2000); else hideModal(); });
        })();
      }

      // ── Save ──────────────────────────────────────────────────────────────────
      saveBtn.addEventListener('click', async () => {
        statusMsg.textContent = '';
        const params = new URLSearchParams();
        for (const id of fields) {
          const el = document.getElementById(id);
          if (el) params.set(apiKeys[id], el.value);
        }

        showModal('Saving…', 'Writing configuration to device.');
        try {
          const d = await fetch('/api/settings', {
            method: 'POST',
            body: params,
          }).then(r => r.json());

          if (!d.success) throw new Error(d.message ?? 'Save failed');

          elStep.textContent = 'Rebooting…';
          elMsg.textContent  = 'Waiting for device to come back online.';
          waitForReboot();

        } catch (err) {
          hideModal();
          statusMsg.textContent = err.message;
          statusMsg.className   = 'text-center text-sm text-red-600 dark:text-red-400';
        }
      });

      // ── Reset to defaults ─────────────────────────────────────────────────────
      document.getElementById('resetBtn').addEventListener('click', async () => {
        if (!confirm('Reset all settings to firmware defaults and reboot?')) return;
        statusMsg.textContent = '';
        showModal('Resetting…', 'Deleting saved config and rebooting.');
        try {
          const d = await fetch('/api/reset', { method: 'POST' }).then(r => r.json());
          if (!d.success) throw new Error('Reset failed');
          elStep.textContent = 'Rebooting…';
          elMsg.textContent  = 'Waiting for device to come back online.';
          waitForReboot();
        } catch (err) {
          hideModal();
          statusMsg.textContent = err.message;
          statusMsg.className   = 'text-center text-sm text-red-600 dark:text-red-400';
        }
      });

      // ── Collapsible cards ─────────────────────────────────────────────────────
      document.querySelectorAll('.card-hdr').forEach(btn => {
        const body = btn.nextElementSibling;
        const ch   = btn.querySelector('.card-chevron');
        btn.addEventListener('click', () => {
          const nowHidden = body.classList.toggle('hidden');
          ch.classList.toggle('-rotate-90', nowHidden);
        });
      });

      window.addEventListener('load', connect);
    </script>
  </body>
</html>
