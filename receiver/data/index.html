<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" id="themeColor" content="#f9fafb" />
    <title>receiver</title>
    <link rel="icon" href="favicon.ico" />
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>
    <script src="js/tailwind.js"></script>
    <style type="text/tailwindcss">
      @variant dark (&:where(.dark, .dark *));
    </style>
  </head>

  <body class="bg-gray-100 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col">

    <nav class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-10">
      <div id="ws-bar" class="h-1 transition-colors duration-300"></div>
      <div class="max-w-2xl mx-auto px-4 h-12 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2">
          <img src="/images/muhradio.png" alt="" class="w-7 h-7" />
          <span id="desc" class="font-semibold text-sm text-gray-800 dark:text-gray-100"></span>
        </a>
        <div class="flex items-center gap-4">
          <a href="/" title="Dashboard" class="text-gray-800 dark:text-gray-100 flex items-center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M9.293 2.293a1 1 0 0 1 1.414 0l7 7A1 1 0 0 1 17 11h-1v6a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-6H3a1 1 0 0 1-.707-1.707l7-7Z" clip-rule="evenodd"/></svg></a>
          <a href="/update.html" title="Firmware" class="text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 flex items-center transition-colors"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path d="M9.25 13.25a.75.75 0 0 0 1.5 0V4.636l2.955 3.129a.75.75 0 0 0 1.09-1.03l-4.25-4.5a.75.75 0 0 0-1.09 0l-4.25 4.5a.75.75 0 1 0 1.09 1.03L9.25 4.636v8.614Z"/><path d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z"/></svg></a>
          <a href="/settings.html" title="Settings" class="text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 flex items-center transition-colors"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.25l-1.18 2.045a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/></svg></a>
          <button id="themeBtn" class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-100 flex items-center transition-colors"></button>
          <button onclick="location.reload()" title="Refresh" class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-100 flex items-center transition-colors"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 0 1-9.201 2.466l-.312-.311h2.433a.75.75 0 0 0 0-1.5H3.989a.75.75 0 0 0-.75.75v4.242a.75.75 0 0 0 1.5 0v-2.43l.31.31a7 7 0 0 0 11.712-3.138.75.75 0 0 0-1.449-.39Zm1.23-3.723a.75.75 0 0 0 .219-.53V2.929a.75.75 0 0 0-1.5 0V5.36l-.31-.31A7 7 0 0 0 3.239 8.188a.75.75 0 1 0 1.448.389A5.5 5.5 0 0 1 13.89 6.11l.311.31h-2.432a.75.75 0 0 0 0 1.5h4.243a.75.75 0 0 0 .53-.219Z" clip-rule="evenodd"/></svg></button>
        </div>
      </div>
    </nav>

    <!-- Tailwind safelist -->
    <div class="hidden
      bg-green-500 bg-yellow-400 bg-red-500
      text-green-600 text-red-600 dark:text-green-400 dark:text-red-400
      bg-gray-100 dark:bg-gray-800/60 text-gray-500 dark:text-gray-400
      bg-red-100 bg-orange-100 bg-amber-100 bg-yellow-100 bg-lime-100
      bg-green-100 bg-teal-100 bg-cyan-100 bg-sky-100 bg-blue-100
      bg-indigo-100 bg-violet-100 bg-purple-100 bg-pink-100 bg-rose-100
      dark:bg-red-900/40 dark:bg-orange-900/40 dark:bg-amber-900/40 dark:bg-yellow-900/40 dark:bg-lime-900/40
      dark:bg-green-900/40 dark:bg-teal-900/40 dark:bg-cyan-900/40 dark:bg-sky-900/40 dark:bg-blue-900/40
      dark:bg-indigo-900/40 dark:bg-violet-900/40 dark:bg-purple-900/40 dark:bg-pink-900/40 dark:bg-rose-900/40
      text-red-700 text-orange-700 text-amber-700 text-yellow-700 text-lime-700
      text-green-700 text-teal-700 text-cyan-700 text-sky-700 text-blue-700
      text-indigo-700 text-violet-700 text-purple-700 text-pink-700 text-rose-700
      dark:text-red-300 dark:text-orange-300 dark:text-amber-300 dark:text-yellow-300 dark:text-lime-300
      dark:text-green-300 dark:text-teal-300 dark:text-cyan-300 dark:text-sky-300 dark:text-blue-300
      dark:text-indigo-300 dark:text-violet-300 dark:text-purple-300 dark:text-pink-300 dark:text-rose-300
      grid grid-cols-8 gap-x-4 gap-y-2 block shrink-0 mt-0.5 mb-2 pt-2 mt-2
      text-sm font-semibold tabular-nums text-gray-900 dark:text-gray-100
      text-xs text-gray-400 dark:text-gray-500
    "></div>

    <main class="flex-1 py-4">
      <div class="max-w-2xl mx-auto px-4 flex flex-col gap-4">

        <!-- Status card -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
          <button class="card-hdr w-full px-4 py-3 flex items-center justify-between text-left">
            <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Status</span>
            <svg class="card-chevron w-4 h-4 text-gray-400 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
          </button>
          <div class="border-t border-gray-100 dark:border-gray-800 divide-y divide-gray-100 dark:divide-gray-800">

            <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
              <span class="text-sm font-medium text-gray-500 dark:text-gray-400">SSID</span>
              <span class="text-sm text-right">
                <span id="ssid"></span>
                <span id="rssiWrap" class="inline-flex items-center gap-1.5 ml-2">
                  <span id="rssidot" class="inline-block w-2 h-2 rounded-full bg-gray-300"></span>
                  <span id="rssi" class="text-xs text-gray-400 dark:text-gray-500"></span>
                </span>
              </span>
            </div>

            <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
              <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Hostname</span>
              <span id="hostname" class="text-sm font-mono"></span>
            </div>

            <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
              <span class="text-sm font-medium text-gray-500 dark:text-gray-400">IP</span>
              <span id="ip" class="text-sm font-mono"></span>
            </div>

            <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
              <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Uptime</span>
              <span id="uptime" class="text-sm font-mono tabular-nums"></span>
            </div>

            <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
              <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Free Memory</span>
              <span class="text-sm">
                <span id="memfree"></span><span id="memfrag" class="text-xs text-gray-400 dark:text-gray-500"></span>
              </span>
            </div>

            <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
              <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Reset</span>
              <span id="resetreason" class="text-sm"></span>
            </div>

            <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
              <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Last Update</span>
              <span id="timestamp" class="text-sm font-mono tabular-nums"></span>
            </div>

          </div>
        </div>

        <!-- Packets card -->
        <div id="packetsCard" class="hidden bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
          <button class="card-hdr w-full px-4 py-3 flex items-center justify-between text-left">
            <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Last Packets</span>
            <svg class="card-chevron w-4 h-4 text-gray-400 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
          </button>
          <div id="packets" class="border-t border-gray-100 dark:border-gray-800 divide-y divide-gray-100 dark:divide-gray-800"></div>
        </div>

      </div>
    </main>

    <footer class="py-3 text-center border-t border-gray-200 dark:border-gray-800">
      <span id="version"></span>
    </footer>

    <script>
      // ── Theme ─────────────────────────────────────────────────────────────────
      const html      = document.documentElement;
      const themeBtn  = document.getElementById('themeBtn');
      const themeColor = document.getElementById('themeColor');

      function applyTheme(dark) {
        html.classList.toggle('dark', dark);
        themeBtn.innerHTML = dark
          ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path d="M10 2a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 10 2ZM10 15a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 10 15ZM10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6ZM15.657 5.404a.75.75 0 1 0-1.06-1.06l-1.061 1.06a.75.75 0 0 0 1.06 1.06l1.06-1.06ZM6.464 14.596a.75.75 0 1 0-1.06-1.06l-1.06 1.06a.75.75 0 0 0 1.06 1.06l1.06-1.06ZM18 10a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 18 10ZM5 10a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 5 10ZM14.596 15.657a.75.75 0 0 0 1.06-1.06l-1.06-1.061a.75.75 0 1 0-1.06 1.06l1.06 1.06ZM5.404 6.464a.75.75 0 0 0 1.06-1.06L5.404 4.343a.75.75 0 0 0-1.06 1.06l1.06 1.061Z"/></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M7.455 2.004a.75.75 0 0 1 .26.77 7 7 0 0 0 9.958 7.967.75.75 0 0 1 1.067.853A8.5 8.5 0 1 1 6.647 1.921a.75.75 0 0 1 .808.083Z" clip-rule="evenodd"/></svg>';
        themeColor.content   = dark ? '#030712' : '#f9fafb';
        localStorage.setItem('theme', dark ? 'dark' : 'light');
      }
      applyTheme(html.classList.contains('dark'));
      themeBtn.addEventListener('click', () => applyTheme(!html.classList.contains('dark')));

      // ── DOM refs ──────────────────────────────────────────────────────────────
      const elTitle       = document.querySelector('title');
      const elHost        = document.getElementById('hostname');
      const elDesc        = document.getElementById('desc');
      const elSsid        = document.getElementById('ssid');
      const elRssi        = document.getElementById('rssi');
      const elRssiDot     = document.getElementById('rssidot');
      const elIp          = document.getElementById('ip');
      const elUptime      = document.getElementById('uptime');
      const elMemfree     = document.getElementById('memfree');
      const elMemfrag     = document.getElementById('memfrag');
      const elReset       = document.getElementById('resetreason');
      const elTs          = document.getElementById('timestamp');
      const elVersion     = document.getElementById('version');
      const elPackets     = document.getElementById('packets');
      const elPacketsCard = document.getElementById('packetsCard');
      const wsBar         = document.getElementById('ws-bar');

      // ── Helpers ───────────────────────────────────────────────────────────────
      const pad = (n) => String(n).padStart(2, '0');

      function fmtTime(epoch) {
        const d = new Date(epoch * 1000);
        return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }

      let _boottime = 0;
      function fmtUptime(boottime) {
        const sec = Math.max(0, Math.floor(Date.now() / 1000) - boottime);
        const d   = Math.floor(sec / 86400);
        const h   = Math.floor((sec % 86400) / 3600);
        const m   = Math.floor((sec % 3600) / 60);
        const s   = sec % 60;
        return d > 0 ? `${d}d ${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(h)}:${pad(m)}:${pad(s)}`;
      }

      // Unit suffixes for known field names
      const UNITS = {
        T_SI: '°C', H_SI: '%',
        T_DS: '°C',
        T_BMP: '°C', P_BMP: 'hPa',
        T_BME: '°C', H_BME: '%', P_BME: 'hPa', G_BME: 'kΩ',
        VCC: 'V', RSSI: 'dBm', SNR: 'dB',
        // Bresser 7-in-1
        temp: '°C', hum: '%', wind: ' m/s', gust: ' m/s', dir: '°',
        rain: ' mm', lux: ' klx', uv: '', rssi: ' dBm',
      };

      // Packet field categories for structured rendering
      const PKT_ID     = new Set(['id', 'uid', 'pid']);
      const PKT_SIGNAL = new Set(['rssi', 'RSSI', 'SNR']);
      const PKT_SENSOR = new Set([
        'temp', 'hum', 'wind', 'gust', 'dir', 'rain', 'lux', 'uv',
        'T_SI', 'H_SI', 'T_DS', 'T_BMP', 'P_BMP', 'T_BME', 'H_BME', 'P_BME', 'G_BME', 'VCC',
      ]);

      const _PALETTE = [
        'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300',
        'bg-orange-100 dark:bg-orange-900/40 text-orange-700 dark:text-orange-300',
        'bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300',
        'bg-yellow-100 dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-300',
        'bg-lime-100 dark:bg-lime-900/40 text-lime-700 dark:text-lime-300',
        'bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300',
        'bg-teal-100 dark:bg-teal-900/40 text-teal-700 dark:text-teal-300',
        'bg-cyan-100 dark:bg-cyan-900/40 text-cyan-700 dark:text-cyan-300',
        'bg-sky-100 dark:bg-sky-900/40 text-sky-700 dark:text-sky-300',
        'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300',
        'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300',
        'bg-violet-100 dark:bg-violet-900/40 text-violet-700 dark:text-violet-300',
        'bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300',
        'bg-pink-100 dark:bg-pink-900/40 text-pink-700 dark:text-pink-300',
        'bg-rose-100 dark:bg-rose-900/40 text-rose-700 dark:text-rose-300',
      ];
      function _hash(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0xffff;
        return _PALETTE[h % _PALETTE.length];
      }
      function chipColor(key, val) {
        if (key === 'RSSI' || key === 'SNR' || key === 'rssi')
          return 'bg-gray-100 dark:bg-gray-800/60 text-gray-500 dark:text-gray-400';
        if (key === 'BUTTON' || key === 'SWITCH' || key === 'PIR' || key === 'RADAR' || key === 'bat')
          return val
            ? 'bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300'
            : 'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300';
        const m = key.match(/_(BME|DS|SI|BMP)$/);
        if (m) return _hash(m[1]);
        if (key === 'uid' || key === 'pid' || key === 'id') return _hash(String(val));
        return _hash(key);
      }

      // ── RSSI dot ─────────────────────────────────────────────────────────────
      function rssiDotColor(dbm) {
        if (dbm >= -65) return 'bg-green-500';
        if (dbm >= -80) return 'bg-yellow-400';
        return 'bg-red-500';
      }

      // ── Live uptime ticker ────────────────────────────────────────────────────
      setInterval(() => {
        if (_boottime > 1577836800) elUptime.textContent = fmtUptime(_boottime);
      }, 1000);

      // ── WebSocket ─────────────────────────────────────────────────────────────
      function setWsBar(state) {
        wsBar.className = 'h-1 transition-colors duration-300 ' + (
          state === 'connected'    ? 'bg-green-500' :
          state === 'disconnected' ? 'bg-red-500'   : 'bg-gray-400');
      }
      setWsBar('connecting');

      function connect() {
        const ws = new WebSocket(`ws://${location.hostname}/ws`);
        ws.onopen  = () => setWsBar('connected');
        ws.onclose = () => { setWsBar('disconnected'); setTimeout(connect, 10_000); };
        ws.onmessage = (e) => onMessage(JSON.parse(e.data));
      }

      // ── Message handler ───────────────────────────────────────────────────────
      let prevVersion = null;

      function onMessage(d) {
        if (d.hostname) { elTitle.textContent = d.hostname; elHost.textContent = d.hostname; }
        if (d.desc)        { elDesc.textContent = d.desc; elTitle.textContent = d.desc; }
        if (d.ssid)        elSsid.textContent  = d.ssid;
        if (d.ip)          elIp.textContent    = d.ip;
        if (d.resetreason) elReset.textContent = d.resetreason;
        if (d.timestamp)   elTs.textContent    = fmtTime(d.timestamp);

        if (d.rssi != null) {
          const pct = Math.round(Math.max(0, Math.min(100, d.rssi + 100)));
          elRssi.textContent = `${pct}%  ${d.rssi} dBm`;
          elRssiDot.className = `inline-block w-2 h-2 rounded-full ${rssiDotColor(d.rssi)}`;
        }
        if (d.memfree) {
          elMemfree.textContent = (d.memfree / 1024).toFixed(1) + ' KB';
          elMemfrag.textContent = d.memfrag ? ` (frag. ${d.memfrag}%)` : '';
        }
        if (d.boottime > 1577836800) {
          _boottime = d.boottime;
          elUptime.textContent = fmtUptime(_boottime);
        }

        if (d.version && d.version !== prevVersion) {
          prevVersion = d.version;
          const a = document.createElement('a');
          a.href        = '/update.html';
          a.className   = 'text-gray-400 dark:text-gray-500 text-xs hover:text-gray-700 dark:hover:text-gray-300 transition-colors';
          a.textContent = d.version;
          elVersion.replaceChildren(a);
        }

        if (Array.isArray(d.packets) && d.packets.some(Boolean)) {
          elPacketsCard.classList.remove('hidden');
          elPackets.replaceChildren();

          for (const raw of d.packets) {
            if (!raw) continue;
            const pkt = JSON.parse(raw);
            const ts  = pkt.timestamp ? fmtTime(pkt.timestamp) : (pkt.ts ? fmtTime(pkt.ts) : '');
            delete pkt.RN; delete pkt.node; delete pkt.timestamp; delete pkt.ts;

            const ids = [], sigs = [], chips = [];
            for (const [k, v] of Object.entries(pkt)) {
              if (PKT_ID.has(k))          ids.push([k, v]);
              else if (PKT_SIGNAL.has(k)) sigs.push([k, v]);
              else                        chips.push([k, v]);
            }

            const card = document.createElement('div');
            card.className = 'px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors';

            // Header: timestamp + id chips left, signal quality right
            const hdr = document.createElement('div');
            hdr.className = 'flex items-center justify-between mb-2';
            const hdrL = document.createElement('div');
            hdrL.className = 'flex items-center gap-2';
            if (ts) {
              const t = document.createElement('span');
              t.className = 'text-xs font-mono tabular-nums font-semibold text-gray-500 dark:text-gray-400 shrink-0';
              t.textContent = ts;
              hdrL.appendChild(t);
            }
            for (const [k, v] of ids) {
              const c = document.createElement('span');
              c.className = `inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${chipColor(k, v)}`;
              c.textContent = String(v);
              hdrL.appendChild(c);
            }
            hdr.appendChild(hdrL);
            if (sigs.length) {
              const sr = document.createElement('div');
              sr.className = 'flex items-center gap-2 shrink-0';
              for (const [k, v] of sigs) {
                const s = document.createElement('span');
                s.className = 'text-xs font-mono text-gray-400 dark:text-gray-500';
                s.textContent = `${v}${UNITS[k] ?? ''}`;
                sr.appendChild(s);
              }
              hdr.appendChild(sr);
            }
            card.appendChild(hdr);

            // All remaining fields as chips
            if (chips.length) {
              const strip = document.createElement('div');
              strip.className = 'flex flex-wrap gap-1.5';
              for (const [k, v] of chips) {
                const c = document.createElement('span');
                c.className = `inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${chipColor(k, v)}`;
                c.textContent = `${k}: ${v}${UNITS[k] ?? ''}`;
                strip.appendChild(c);
              }
              card.appendChild(strip);
            }

            elPackets.appendChild(card);
          }
        }
      }

      // ── Collapsible cards ─────────────────────────────────────────────────────
      document.querySelectorAll('.card-hdr').forEach(btn => {
        const body = btn.nextElementSibling;
        const ch   = btn.querySelector('.card-chevron');
        btn.addEventListener('click', () => {
          const nowHidden = body.classList.toggle('hidden');
          ch.classList.toggle('-rotate-90', nowHidden);
        });
      });

      window.addEventListener('load', connect);
    </script>
  </body>
</html>
